<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fire Extinguisher Inspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="brand">
        <div class="logo">🧯</div>
        <div>
          <h1>Monthly Fire Extinguisher Checklist</h1>
          <p>Scan QR → verify equipment → submit inspection</p>
        </div>
      </div>
      <div class="actions">
        <div id="userChip" class="tag">Not logged in</div>
        <a class="btn secondary" href="index.html">Dashboard</a>
        <button class="btn secondary" data-logout type="button">Logout</button>
      </div>
    </div>

    <div id="pageError" class="notice hidden"></div>

    <div class="grid grid-2">
      <div class="card panel">
        <div class="section-title"><h2>Equipment Details</h2></div>
        <div id="equipmentSummary"></div>
      </div>

      <div class="card panel">
        <div class="section-title"><h2>Inspection Info</h2></div>
        <div class="stat-line"><strong>Frequency</strong><span>Monthly</span></div>
        <div class="stat-line"><strong>Photo</strong><span>Optional</span></div>
        <div class="stat-line"><strong>Status</strong><span>Auto-calculated</span></div>
      </div>
    </div>

    <div class="card panel" style="margin-top:16px">
      <div class="section-title"><h2>Inspection Form</h2></div>
      <div id="formNotice" class="notice hidden"></div>

      <form id="inspectionForm">
        <div class="grid grid-3">
          <div class="field">
            <label>Equipment ID</label>
            <input name="equipmentId" readonly required>
          </div>
          <div class="field">
            <label>Location</label>
            <input name="location" readonly>
          </div>
          <div class="field">
            <label>Department</label>
            <input name="department" readonly>
          </div>
          <div class="field">
            <label>Inspection Date</label>
            <input name="inspectionDate" type="date" required>
          </div>
          <div class="field">
            <label>Inspector Name</label>
            <input name="inspectorName" readonly>
          </div>
          <div class="field">
            <label>Inspector ID</label>
            <input name="inspectorId" readonly>
          </div>
        </div>

        <div id="dynamicQuestionArea" class="grid grid-2" style="margin-top:16px"></div>

        <div class="grid grid-2" style="margin-top:16px">
          <div class="field">
            <label>Photo Upload</label>
            <div class="dropzone">
              <input type="file" accept="image/*" capture="environment" name="photo">
              <div class="small" style="margin-top:8px">Mobile camera opens automatically on supported phones.</div>
              <div id="photoPreview"></div>
            </div>
          </div>
        </div>

        <div class="actions" style="margin-top:18px">
          <button type="submit">Submit Inspection</button>
          <button type="reset" class="btn secondary">Reset Form</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
